<!-- MCM Outdoor Living - Decking Cost Calculator (Elementor HTML Widget)
  Layout (requested):
  Row 1: Length | Width | Estimated deck area
  Row 2: Decking material | Design complexity | Elevation
  Row 3: Railing type | Railing length | Stairs
  Output: Estimated total cost range (no extra note line)

  Pricing notes:
  - Decking material installed $/sq ft ranges are from your website table.
  - Elevation + complexity multipliers are a first-pass model (so they move the estimate).
  - Railing type pricing is placeholder until you provide real MCM railing pricing.
-->

<div id="mcm-deck-calculator" class="mcm-calc">
  <div class="mcm-calc__header">
    <h3>Decking Cost Calculator</h3>
    <p class="mcm-calc__sub">
      Explore a starting cost range based on size, decking material, elevation, railings, and stairs.
    </p>
  </div>

  <!-- Row 1 -->
  <div class="mcm-calc__grid mcm-calc__grid--3">
    <div class="mcm-calc__field">
      <label for="mcmDeckLength">Deck length (ft)</label>
      <input id="mcmDeckLength" type="number" min="6" step="1" value="20" />
    </div>

    <div class="mcm-calc__field">
      <label for="mcmDeckWidth">Deck width (ft)</label>
      <input id="mcmDeckWidth" type="number" min="6" step="1" value="12" />
    </div>

    <div class="mcm-calc__field">
      <label>Estimated deck area</label>
      <div class="mcm-calc__readonly" id="mcmDeckArea">--</div>
    </div>
  </div>

  <!-- Row 2 -->
  <div class="mcm-calc__grid mcm-calc__grid--3" style="margin-top:12px;">
    <div class="mcm-calc__field">
      <label for="mcmDeckMaterial">Decking material (installed)</label>
      <select id="mcmDeckMaterial">
        <option value="pt" selected>Pressure-treated pine ($21–$24 / sq ft)</option>
        <option value="bamboo">Bamboo ($27–$30 / sq ft)</option>
        <option value="cedar">Cedar ($34–$39 / sq ft)</option>
        <option value="composite">Composite ($40–$42 / sq ft)</option>
        <option value="redwood">Redwood ($45–$49 / sq ft)</option>
        <option value="cumaru">Cumaru ($46–$50 / sq ft)</option>
        <option value="massaranduba">Massaranduba ($49–$52 / sq ft)</option>
        <option value="garapa">Garapa ($45–$49 / sq ft)</option>
        <option value="tigerwood">Tigerwood ($53–$57 / sq ft)</option>
        <option value="ipe">Ipe ($64–$68 / sq ft)</option>
        <option value="teak">Teak ($67–$70 / sq ft)</option>
      </select>
    </div>

    <div class="mcm-calc__field">
      <label for="mcmDeckComplexity">Design complexity</label>
      <select id="mcmDeckComplexity">
        <option value="simple" selected>Simple (rectangular / standard layout)</option>
        <option value="moderate">Moderate (some angles / wrap corners)</option>
        <option value="complex">Complex (multi zones / custom details)</option>
      </select>
    </div>

    <div class="mcm-calc__field">
      <label for="mcmDeckElevation">Elevation</label>
      <select id="mcmDeckElevation">
        <option value="ground" selected>Ground-level (0–1 ft)</option>
        <option value="raised">Raised (3–6 ft)</option>
        <option value="elevated">Elevated (6–10+ ft)</option>
      </select>
    </div>
  </div>

  <!-- Row 3 -->
  <div class="mcm-calc__grid mcm-calc__grid--3" style="margin-top:12px;">
    <div class="mcm-calc__field">
      <label for="mcmRailingType">Railing type</label>
      <select id="mcmRailingType">
        <option value="none" selected>No railing</option>
        <option value="wood">Wood railing (basic)</option>
        <option value="metal">Metal railing (premium)</option>
        <option value="glass">Glass railing (high-end)</option>
      </select>
    </div>

    <div class="mcm-calc__field">
      <label for="mcmRailingLen">Railing length (linear ft)</label>
      <input id="mcmRailingLen" type="number" min="0" step="1" value="0" />
    </div>

    <div class="mcm-calc__field">
      <label for="mcmDeckStairs">Stairs</label>
      <select id="mcmDeckStairs">
        <option value="none" selected>None</option>
        <option value="small">1–2 steps</option>
        <option value="medium">3–5 steps</option>
        <option value="large">6–10 steps</option>
      </select>
    </div>
  </div>

  <div class="mcm-calc__result">
    <div class="mcm-calc__resultBox">
      <div class="mcm-calc__resultLabel">Estimated total cost range</div>
      <div class="mcm-calc__resultValue" id="mcmDeckResult">$--</div>
    </div>
  </div>
</div>

<style>
  .mcm-calc { font-family: inherit; border: 1px solid rgba(0,0,0,0.12); border-radius: 14px; padding: 18px; max-width: 950px; }
  .mcm-calc__header h3 { margin: 0 0 6px; font-size: 22px; line-height: 1.2; }
  .mcm-calc__sub { margin: 0 0 14px; opacity: 0.85; }

  .mcm-calc__grid { display: grid; gap: 12px; }
  .mcm-calc__grid--3 { grid-template-columns: repeat(3, 1fr); }

  .mcm-calc__field label { display: block; font-size: 13px; margin-bottom: 6px; opacity: 0.9; }
  .mcm-calc__field input, .mcm-calc__field select {
    width: 100%; padding: 10px 10px; border: 1px solid rgba(0,0,0,0.18);
    border-radius: 10px; font-size: 14px; background: #fff;
  }

  .mcm-calc__field input:disabled, .mcm-calc__field select:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .mcm-calc__readonly {
    padding: 10px 10px; border: 1px dashed rgba(0,0,0,0.25);
    border-radius: 10px; font-size: 14px; background: rgba(0,0,0,0.03);
  }

  .mcm-calc__result { margin-top: 16px; }
  .mcm-calc__resultBox { border: 1px solid rgba(0,0,0,0.12); border-radius: 14px; padding: 14px; background: rgba(0,0,0,0.02); }
  .mcm-calc__resultLabel { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
  .mcm-calc__resultValue { font-size: 28px; font-weight: 700; letter-spacing: 0.2px; }

  @media (max-width: 860px) {
    .mcm-calc__grid--3 { grid-template-columns: repeat(2, 1fr); }
  }
</style>

<script>
  (function () {
    const root = document.getElementById("mcm-deck-calculator");
    if (!root) return;

    // Installed $/sq ft ranges (FROM YOUR WEBSITE TABLE)
    const materialRate = {
      pt:           { min: 21, max: 24 },
      bamboo:       { min: 27, max: 30 },
      cedar:        { min: 34, max: 39 },
      composite:    { min: 40, max: 42 },
      redwood:      { min: 45, max: 49 },
      cumaru:       { min: 46, max: 50 },
      massaranduba: { min: 49, max: 52 },
      garapa:       { min: 45, max: 49 },
      tigerwood:    { min: 53, max: 57 },
      ipe:          { min: 64, max: 68 },
      teak:         { min: 67, max: 70 }
    };

    // First-pass multipliers so they actually move the estimate
    const complexityMult = { simple: 1.00, moderate: 1.08, complex: 1.15 };
    const elevationMult  = { ground: 1.00, raised: 1.10, elevated: 1.22 };

    const stairRanges = {
      none:   { min: 0,    max: 0 },
      small:  { min: 800,  max: 2000 },
      medium: { min: 2000, max: 4500 },
      large:  { min: 4500, max: 9000 }
    };

    // PLACEHOLDER railing pricing until you provide MCM numbers
    // (kept separate per railing type)
    const railingRate = {
      none:  { min: 0,   max: 0 },
      wood:  { min: 55,  max: 95 },
      metal: { min: 85,  max: 140 },
      glass: { min: 140, max: 220 }
    };

    const els = {
      len: document.getElementById("mcmDeckLength"),
      wid: document.getElementById("mcmDeckWidth"),
      area: document.getElementById("mcmDeckArea"),
      material: document.getElementById("mcmDeckMaterial"),
      cx: document.getElementById("mcmDeckComplexity"),
      elev: document.getElementById("mcmDeckElevation"),
      railType: document.getElementById("mcmRailingType"),
      railLen: document.getElementById("mcmRailingLen"),
      stairs: document.getElementById("mcmDeckStairs"),
      result: document.getElementById("mcmDeckResult")
    };

    function fmtMoney(n) {
      const rounded = Math.round(n);
      return "$" + rounded.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function syncRailingUI() {
      const t = els.railType.value;
      const isNone = (t === "none");
      els.railLen.disabled = isNone;
      if (isNone) els.railLen.value = 0;
    }

    function calc() {
      const length = Number(els.len.value);
      const width  = Number(els.wid.value);

      if (!length || !width || length < 6 || width < 6) {
        els.area.textContent = "--";
        els.result.textContent = "$--";
        return;
      }

      const area = length * width;
      els.area.textContent = area.toFixed(0) + " sq ft";

      const materialKey = els.material.value;
      const cxKey = els.cx.value;
      const elevKey = els.elev.value;

      const r = materialRate[materialKey] || materialRate.pt;
      const mCx = complexityMult[cxKey] || 1.0;
      const mEl = elevationMult[elevKey] || 1.0;

      let minTotal = area * r.min * mCx * mEl;
      let maxTotal = area * r.max * mCx * mEl;

      // Railings
      const railType = els.railType.value;
      const railLen = Math.max(0, Number(els.railLen.value || 0));
      const rr = railingRate[railType] || railingRate.none;

      if (railType !== "none" && railLen > 0) {
        minTotal += railLen * rr.min;
        maxTotal += railLen * rr.max;
      }

      // Stairs
      const s = stairRanges[els.stairs.value] || stairRanges.none;
      minTotal += s.min;
      maxTotal += s.max;

      if (maxTotal < minTotal + 1200) maxTotal = minTotal + 1200;
      els.result.textContent = fmtMoney(minTotal) + " – " + fmtMoney(maxTotal);
    }

    root.addEventListener("input", function () {
      syncRailingUI();
      calc();
    });
    root.addEventListener("change", function () {
      syncRailingUI();
      calc();
    });

    syncRailingUI();
    calc();
  })();
</script>
